name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm test

      - name: Build production bundle
        run: npm run build

  browser-validation:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install playwright numpy cobra
          playwright install chromium --with-deps

      - name: Download test models
        run: |
          mkdir -p python/models
          curl -sL -o python/models/e_coli_core.json \
            http://bigg.ucsd.edu/static/models/e_coli_core.json

      - name: Run cross-solver validation (HiGHS WASM vs COBRApy)
        run: |
          cd python
          python run_browser_validation.py \
            --num-models 1 \
            --model-dir models \
            --output validation_results/highs_results.json

      - name: Upload validation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: validation-results
          path: python/validation_results/
